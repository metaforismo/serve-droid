name: Bug report
description: Report a reproducible serve-droid problem.
body:
  - type: textarea
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction
    validations:
      required: true
  - type: input
    attributes:
      label: Host, browser, Android version, and device
    validations:
      required: true
